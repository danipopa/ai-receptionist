[general]
enabled = yes
pretty = yes
bindaddr = 0.0.0.0
bindport = 8088
tlsenable=no

; Authentication
username = asterisk
password = asterisk

; CORS settings for web applications
[cors]
enabled = yes
allow_origin = *
allow_methods = GET, POST, PUT, DELETE, OPTIONS
allow_headers = Content-Type, Authorization

; Applications
[ai-receptionist]
type = application
name = ai-receptionist
