[general]
context=default
allowoverlap=no
allowguest=no
alwaysauthreject=yes
musiconhold=default
mohinterpret=default
mohsuggest=default

bindaddr=0.0.0.0
bindport=5060
srvlookup=yes
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=g726
allow=g722

; NAT settings
nat=force_rport,comedia
externip=YOUR_EXTERNAL_IP
localnet=192.168.0.0/255.255.0.0

; Security
allowguest=no
alwaysauthreject=yes

; SIP Provider Template
[trunk-template](!)
type=friend
host=dynamic
canreinvite=no
context=ai-receptionist
qualify=yes
nat=force_rport,comedia

; SIP Trunk for incoming calls (configure with your provider)
[sip-provider](trunk-template)
username=YOUR_SIP_USERNAME
secret=YOUR_SIP_PASSWORD
host=YOUR_SIP_PROVIDER
fromdomain=YOUR_SIP_DOMAIN
context=ai-receptionist

; Local SIP phone for testing
[testphone](!)
type=friend
context=ai-receptionist
host=dynamic
secret=testpass123
canreinvite=no

[1001](testphone)
[1002](testphone)
[1003](testphone)
