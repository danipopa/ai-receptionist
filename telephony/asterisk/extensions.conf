[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
; AI Receptionist Configuration
AI_RECEPTIONIST_APP=ai-receptionist
AI_RECEPTIONIST_URL=http://localhost:8000

[contexts]

; Context for AI Receptionist calls
[ai-receptionist]
; Handle incoming calls
exten => _X.,1,NoOp(AI Receptionist Call from ${CALLERID(num)})
same => n,Set(BUSINESS_ID=${ARG1})  ; Business ID passed as argument
same => n,Answer()
same => n,Set(CALL_ID=${UNIQUEID})
same => n,Stasis(${AI_RECEPTIONIST_APP},${BUSINESS_ID})
same => n,Hangup()

; Default context for unhandled calls
[default]
exten => _X.,1,NoOp(Unhandled call to ${EXTEN})
same => n,Playback(invalid)
same => n,Hangup()

; Handle failed calls
[failed]
exten => _X.,1,NoOp(Failed call handling)
same => n,Playback(temp-unavail)
same => n,Hangup()

; Business-specific contexts (examples)
[business-1]
exten => _X.,1,Goto(ai-receptionist,${EXTEN},1(business-1))

[business-2]
exten => _X.,1,Goto(ai-receptionist,${EXTEN},1(business-2))

; Emergency fallback
[emergency]
exten => _X.,1,NoOp(Emergency fallback for ${CALLERID(num)})
same => n,Answer()
same => n,Playback(emergency-message)
same => n,Hangup()
